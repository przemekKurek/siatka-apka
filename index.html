<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siatkówka App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🏐 Drużyna Siatkarska</h1>
  </header>

  <!-- Modal dodawania/edycji zawodnika -->
  <div id="playerModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle">Dodaj zawodnika</h2>
      <form id="playerForm">
        <input type="text" id="name" placeholder="Imię" required>
        <input type="text" id="surname" placeholder="Nazwisko" required>
        <label>Atak: <input type="number" id="atak" min="1" max="40" required></label>
        <label>Obrona: <input type="number" id="obrona" min="1" max="40" required></label>
        <label>Serwis: <input type="number" id="serwis" min="1" max="40" required></label>
        <label>Wystawa: <input type="number" id="wystawa" min="1" max="40" required></label>
        <label>Wzrost: 
          <select id="wzrost">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>
        <label>Płeć: 
          <select id="gender">
            <option value="kobieta">Kobieta</option>
            <option value="mężczyzna">Mężczyzna</option>
          </select>
        </label>
        <label>Konflikty (imiona i nazwiska, oddzielone przecinkami):
          <input type="text" id="conflicts" placeholder="Jan Nowak, Piotr Wiśniewski">
        </label>
        <button type="submit" id="savePlayerBtn">Zapisz</button>
      </form>
    </div>
  </div>

  <main>
    <section class="player-list">
      <h2>Lista zawodników</h2>
      <div id="players" class="players-container"></div>
    </section>

    <section class="team-generator">
      <button id="generateBtn">Losuj</button>
      <div id="teams" class="teams-container"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Aplikacja siatkarska</p>
  </footer>

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBavHPLC-0SoMY53VjaGdD9To41HMorfM",
  authDomain: "siatkowka-marki.firebaseapp.com",
  projectId: "siatkowka-marki",
  storageBucket: "siatkowka-marki.firebasestorage.app",
  messagingSenderId: "42272616577",
  appId: "1:42272616577:web:2127d217dc60b8a1c8dd80",
  measurementId: "G-HLXWDR5D4F"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
